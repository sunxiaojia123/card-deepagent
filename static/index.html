<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易助手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1117; color: #e1e4e8; height: 100vh; display: flex; }

  .sidebar {
    width: 280px; background: #161b22; border-right: 1px solid #21262d;
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid #21262d;
  }
  .sidebar-header h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }

  .user-switcher {
    display: flex; gap: 6px; align-items: center; margin-bottom: 4px;
  }
  .user-switcher select {
    flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    color: #e1e4e8; padding: 6px 8px; font-size: 13px; font-family: inherit; min-width: 0;
  }
  .user-switcher select option { background: #161b22; }
  .user-switcher button {
    padding: 6px 8px; border: 1px solid #30363d; border-radius: 6px;
    background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 11px;
    white-space: nowrap; flex-shrink: 0;
  }
  .user-switcher button:hover { background: #30363d; }

  .btn {
    padding: 8px 14px; border: 1px solid #30363d; border-radius: 6px;
    background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 13px;
    transition: background .15s;
  }
  .conv-actions { padding: 8px 16px; border-bottom: 1px solid #21262d; }
  .conv-actions .btn { width: 100%; }
  .btn:hover { background: #30363d; }
  .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
  .btn-primary:hover { background: #2ea043; }

  .conv-list { flex: 1; overflow-y: auto; padding: 8px; }
  .conv-item {
    padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
    margin-bottom: 2px; color: #8b949e;
  }
  .conv-item:hover { background: #1c2128; }
  .conv-item.active { background: #1f6feb22; color: #58a6ff; }
  .conv-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv-item .time { font-family: monospace; font-size: 11px; color: #484f58; margin-top: 3px; }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-header {
    padding: 12px 20px; border-bottom: 1px solid #21262d; font-size: 14px;
    color: #8b949e; display: flex; justify-content: space-between; align-items: center;
  }
  .chat-header strong { color: #e1e4e8; }
  .user-badge {
    font-size: 11px; background: #1f6feb22; color: #58a6ff; padding: 3px 10px;
    border-radius: 12px; border: 1px solid #1f6feb44;
  }

  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #1f6feb; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: #21262d; color: #e1e4e8; border-bottom-left-radius: 4px; }
  .msg.assistant.streaming { border-left: 2px solid #58a6ff; }

  .input-area {
    padding: 16px 20px; border-top: 1px solid #21262d;
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-area textarea {
    flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    color: #e1e4e8; padding: 10px 14px; font-size: 14px; resize: none;
    font-family: inherit; min-height: 44px; max-height: 120px;
  }
  .input-area .btn {
    flex-shrink: 0; height: 44px; width: auto;
  }
  .input-area textarea:focus { outline: none; border-color: #58a6ff; }
  .input-area textarea::placeholder { color: #484f58; }

  .empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #484f58; font-size: 15px;
  }

  .toast {
    position: fixed; bottom: 20px; right: 20px; background: #238636; color: #fff;
    padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 100;
    animation: fadeIn .3s;
  }
  .toast.error { background: #da3633; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>交易助手</h1>
    <div class="user-switcher">
      <select id="userSelect"></select>
      <button onclick="applySwitchUser()">切</button>
      <button onclick="addUser()">+</button>
      <button onclick="removeUser()" style="color:#f85149;border-color:#f8514944">-</button>
    </div>
  </div>
  <div class="conv-actions">
    <button class="btn btn-primary" onclick="newConversation()">+ 新会话</button>
  </div>
  <div class="conv-list" id="convList"></div>
</div>

<div class="main">
  <div class="chat-header" id="chatHeader">
    <span>选择或创建一个会话开始对话</span>
    <span class="user-badge" id="userBadge"></span>
  </div>
  <div class="empty-state" id="emptyState">选择一个会话或创建新会话</div>
  <div class="messages" id="messages" style="display:none"></div>
  <div class="input-area" id="inputArea" style="display:none">
    <textarea id="input" placeholder="输入消息..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="btn btn-primary" onclick="sendMessage()">发送</button>
  </div>
</div>

<script>
const BASE = '';
const STORAGE_KEY = 'trading_users';
let currentConvId = null;
let userId = '';

// ── User management ──
function getUsers() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveUsers(users) { localStorage.setItem(STORAGE_KEY, JSON.stringify(users)); }

function initUsers() {
  let users = getUsers();
  if (users.length === 0) {
    users = ['user-alice', 'user-bob'];
    saveUsers(users);
  }
  renderUserSelect(users);
  if (!userId) switchUser(users[0]);
}

function renderUserSelect(users) {
  const sel = document.getElementById('userSelect');
  // 清空
  while (sel.firstChild) sel.removeChild(sel.firstChild);
  // 重建 option
  for (const u of users) {
    const opt = document.createElement('option');
    opt.value = u;
    opt.textContent = u;
    sel.appendChild(opt);
  }
  sel.value = userId || users[0];
}

function applySwitchUser() {
  const sel = document.getElementById('userSelect');
  if (sel.value) switchUser(sel.value);
}

function switchUser(newUserId) {
  if (!newUserId || newUserId === userId) return;
  userId = newUserId;
  renderUserSelect(getUsers());
  // Reset chat — 先重建 chatHeader（含 userBadge），再设置 textContent
  currentConvId = null;
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('messages').style.display = 'none';
  document.getElementById('inputArea').style.display = 'none';
  document.getElementById('chatHeader').innerHTML = '<span>选择或创建一个会话开始对话</span><span class="user-badge" id="userBadge"></span>';
  document.getElementById('userBadge').textContent = userId;
  document.getElementById('messages').innerHTML = '';
  loadConversations();
  toast('已切换到 ' + userId);
}

function addUser() {
  const name = prompt('输入新用户名（英文+数字，如 user-charlie）：');
  if (!name || !/^[a-zA-Z0-9_-]+$/.test(name)) { toast('用户名仅支持英文数字和 -_', true); return; }
  let users = getUsers();
  if (users.includes(name)) { toast('用户已存在', true); return; }
  users.push(name);
  saveUsers(users);
  renderUserSelect(users);
  document.getElementById('userSelect').value = name;
  switchUser(name);
  toast('已切换到 ' + name);
}

function removeUser() {
  let users = getUsers();
  if (users.length <= 1) { toast('至少保留一个用户', true); return; }
  if (!confirm('删除用户 ' + userId + '？将同时删除其所有会话记录。')) return;
  users = users.filter(u => u !== userId);
  saveUsers(users);
  switchUser(users[0]);
  toast('用户已删除');
}

// ── API ──
async function api(method, path, body) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + userId, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(BASE + path, opts);
  if (!resp.ok) throw new Error((await resp.json().catch(() => ({}))).detail || resp.statusText);
  return resp;
}

// ── Conversations ──
async function loadConversations() {
  try {
    const data = await api('GET', '/conversations').then(r => r.json());
    const list = document.getElementById('convList');
    if (data.conversations.length === 0) {
      list.innerHTML = '<div style="padding:12px;color:#484f58;font-size:13px">暂无会话</div>';
      return;
    }
    list.innerHTML = data.conversations.map(c => `
      <div class="conv-item${c.conversation_id === currentConvId ? ' active' : ''}" onclick="selectConversation('${c.conversation_id}')">
        <div class="name">${c.conversation_id.slice(0, 12)}...</div>
        <div class="time">${new Date(c.created_at).toLocaleString('zh-CN')}</div>
      </div>
    `).join('');
  } catch (e) { console.error('load conversations:', e); }
}

async function newConversation() {
  try {
    const data = await api('POST', '/conversations').then(r => r.json());
    await loadConversations();
    selectConversation(data.conversation_id);
    toast('会话已创建');
  } catch (e) { toast('创建失败: ' + e.message, true); }
}

async function selectConversation(id) {
  currentConvId = id;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('messages').style.display = 'flex';
  document.getElementById('inputArea').style.display = 'flex';
  document.getElementById('chatHeader').innerHTML = '<span>会话 <strong>' + id.slice(0, 16) + '...</strong></span><span class="user-badge" id="userBadge">' + userId + '</span>';
  document.getElementById('messages').innerHTML = '';

  try {
    const data = await api('GET', '/conversations/' + id + '/history').then(r => r.json());
    for (const m of data.messages) {
      appendMessage(m.role === 'user' ? 'user' : 'assistant', m.content);
    }
  } catch (e) { console.error('load history:', e); }
  scrollBottom();
  loadConversations();
}

// ── Chat ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !currentConvId) return;
  input.value = '';
  input.style.height = 'auto';

  appendMessage('user', text);
  const bubble = appendMessage('assistant', '', true);

  try {
    const resp = await fetch(BASE + '/conversations/' + currentConvId + '/chat/stream', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + userId, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      let i = 0;
      while (i < lines.length) {
        if (lines[i].startsWith('event: text') && i + 1 < lines.length && lines[i + 1].startsWith('data: ')) {
          const data = JSON.parse(lines[i + 1].slice(6));
          bubble.textContent += data.content;
          i += 2;
        } else if (lines[i].startsWith('event: done')) {
          bubble.classList.remove('streaming');
          i += 1;
        } else if (lines[i].startsWith('event: error')) {
          if (i + 1 < lines.length && lines[i + 1].startsWith('data: ')) {
            const data = JSON.parse(lines[i + 1].slice(6));
            bubble.textContent = '[错误] ' + data.message;
          }
          bubble.classList.remove('streaming');
          i += 2;
        } else {
          i += 1;
        }
      }
      scrollBottom();
    }
    bubble.classList.remove('streaming');
  } catch (e) {
    bubble.textContent = '[错误] ' + e.message;
    bubble.classList.remove('streaming');
  }
  scrollBottom();
}

function appendMessage(role, content, streaming) {
  const div = document.createElement('div');
  div.className = 'msg ' + role + (streaming ? ' streaming' : '');
  div.textContent = content;
  document.getElementById('messages').appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function toast(msg, isError) {
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── Init ──
initUsers();
</script>
</body>
</html>

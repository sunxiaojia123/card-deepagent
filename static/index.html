<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易助手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1117; color: #e1e4e8; height: 100vh; display: flex; }

  .sidebar {
    width: 280px; background: #161b22; border-right: 1px solid #21262d;
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid #21262d;
  }
  .sidebar-header h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }

  .user-switcher {
    display: flex; gap: 6px; align-items: center; margin-bottom: 4px;
  }
  .user-switcher select {
    flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    color: #e1e4e8; padding: 6px 8px; font-size: 13px; font-family: inherit; min-width: 0;
  }
  .user-switcher select option { background: #161b22; }
  .user-switcher button {
    padding: 6px 8px; border: 1px solid #30363d; border-radius: 6px;
    background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 11px;
    white-space: nowrap; flex-shrink: 0;
  }
  .user-switcher button:hover { background: #30363d; }

  .btn {
    padding: 8px 14px; border: 1px solid #30363d; border-radius: 6px;
    background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 13px;
    transition: background .15s;
  }
  .conv-actions { padding: 8px 16px; border-bottom: 1px solid #21262d; }
  .conv-actions .btn { width: 100%; }
  .btn:hover { background: #30363d; }
  .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
  .btn-primary:hover { background: #2ea043; }

  .conv-list { flex: 1; overflow-y: auto; padding: 8px; }
  .conv-item {
    padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
    margin-bottom: 2px; color: #8b949e;
  }
  .conv-item:hover { background: #1c2128; }
  .conv-item.active { background: #1f6feb22; color: #58a6ff; }
  .conv-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv-item .time { font-family: monospace; font-size: 11px; color: #484f58; margin-top: 3px; }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-header {
    padding: 12px 20px; border-bottom: 1px solid #21262d; font-size: 14px;
    color: #8b949e; display: flex; justify-content: space-between; align-items: center;
  }
  .chat-header strong { color: #e1e4e8; }
  .user-badge {
    font-size: 11px; background: #1f6feb22; color: #58a6ff; padding: 3px 10px;
    border-radius: 12px; border: 1px solid #1f6feb44;
  }

  .messages { flex: 1; overflow-y: auto; padding: 20px 20px 10px; display: flex; flex-direction: column; gap: 16px; }

  .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #1f6feb; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: #21262d; color: #e1e4e8; border-bottom-left-radius: 4px; }
  .msg.assistant.streaming { border-left: 2px solid #58a6ff; }
  .msg.tool { align-self: center; background: transparent; color: #58a6ff; font-size: 11px; padding: 2px 0; max-width: 90%; opacity: 0.7; }
  .msg.tool::before { content: '⚙ '; }
  .msg.card { align-self: center; background: #1f6feb11; border: 1px solid #1f6feb33; color: #e1e4e8; font-size: 12px; padding: 10px 14px; max-width: 90%; border-radius: 8px; white-space: pre-wrap; word-break: break-word; }

  .input-area {
    padding: 16px 20px; border-top: 1px solid #21262d;
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-area textarea {
    flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    color: #e1e4e8; padding: 10px 14px; font-size: 14px; resize: none;
    font-family: inherit; min-height: 44px; max-height: 120px;
  }
  .input-area .btn {
    flex-shrink: 0; height: 44px; width: auto;
  }
  .input-area textarea:focus { outline: none; border-color: #58a6ff; }
  .input-area textarea::placeholder { color: #484f58; }

  .empty-state {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #484f58; font-size: 15px;
  }

  .skills-section { border-top: 1px solid #21262d; max-height: 40%; display: flex; flex-direction: column; }
  .skills-header {
    padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; font-size: 13px; font-weight: 600; color: #8b949e; flex-shrink: 0;
  }
  .skills-header:hover { color: #e1e4e8; }
  .skills-header .arrow { font-size: 10px; transition: transform .2s; margin-right: 6px; }
  .skills-header .arrow.open { transform: rotate(90deg); }
  .skills-list { overflow-y: auto; padding: 0 8px 8px; display: none; }
  .skills-list.open { display: block; }
  .skill-item {
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
    margin-bottom: 2px; color: #58a6ff; display: flex; justify-content: space-between; align-items: center;
  }
  .skill-item:hover { background: #1c2128; }
  .skill-item.base { color: #484f58; cursor: default; font-style: italic; }
  .skill-item .del { color: #f85149; padding: 2px 6px; font-size: 11px; display: none; }
  .skill-item:hover .del { display: inline; }
  .skill-item .api-badge { font-size: 10px; color: #58a6ff; background: #1f6feb22; padding: 1px 6px; border-radius: 8px; margin-left: 6px; }
  .skill-apis { padding: 0 12px 8px 28px; display: none; }
  .skill-apis.open { display: block; }
  .api-item { padding: 4px 8px; margin-bottom: 4px; background: #0d1117; border-radius: 6px; font-size: 11px; }
  .api-item .api-method { color: #58a6ff; font-weight: 600; margin-right: 6px; }
  .api-item .api-path { color: #8b949e; }
  .api-item .api-desc { color: #484f58; margin-top: 2px; }
  .api-item .api-show { font-size: 10px; padding: 1px 4px; border-radius: 4px; margin-left: 4px; }
  .api-item .api-show.card { background: #1f6feb22; color: #58a6ff; }
  .api-item .api-show.text { background: #3fb95022; color: #3fb950; }
  .api-item .api-params { color: #484f58; font-size: 10px; margin-top: 2px; }

  .mcp-section { border-top: 1px solid #21262d; max-height: 40%; display: flex; flex-direction: column; }
  .mcp-header {
    padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; font-size: 13px; font-weight: 600; color: #8b949e; flex-shrink: 0;
  }
  .mcp-header:hover { color: #e1e4e8; }
  .mcp-header .arrow { font-size: 10px; transition: transform .2s; margin-right: 6px; }
  .mcp-header .arrow.open { transform: rotate(90deg); }
  .mcp-list { overflow-y: auto; padding: 0 8px 8px; display: none; }
  .mcp-list.open { display: block; }
  .mcp-item {
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
    margin-bottom: 2px; color: #e1e4e8; display: flex; justify-content: space-between; align-items: center;
    white-space: nowrap;
  }
  .mcp-item:hover { background: #1c2128; }
  .mcp-item .name { overflow: hidden; text-overflow: ellipsis; flex: 0 1 auto; min-width: 60px; }
  .mcp-item .transport { font-size: 10px; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; }
  .mcp-item .transport.stdio { background: #3fb95022; color: #3fb950; }
  .mcp-item .transport.sse { background: #d2992222; color: #d29922; }
  .mcp-item .transport.http { background: #a371f722; color: #a371f7; }
  .mcp-item .status { font-size: 10px; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; margin-left: 4px; }
  .mcp-item .status.on { background: #3fb95022; color: #3fb950; }
  .mcp-item .status.off { background: #f8514922; color: #f85149; }
  .mcp-item .del { color: #f85149; padding: 2px 6px; font-size: 11px; display: none; flex-shrink: 0; }
  .mcp-item:hover .del { display: inline; }
  .mcp-detail { padding: 4px 12px 8px 28px; display: none; }
  .mcp-detail.open { display: block; }
  .mcp-detail .detail-row { font-size: 11px; color: #8b949e; margin-bottom: 3px; word-break: break-all; }
  .mcp-detail .detail-row code { background: #0d1117; padding: 1px 4px; border-radius: 4px; font-size: 11px; color: #c9d1d9; }

  .modal select {
    width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    color: #e1e4e8; padding: 8px 12px; font-size: 13px; font-family: inherit; margin-bottom: 12px;
  }
  .modal select:focus { outline: none; border-color: #58a6ff; }
  .modal label.inline { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
  .modal label.inline input[type=checkbox] { width: auto; margin-bottom: 0; }

  .msg.status {
    align-self: center; background: transparent; font-size: 11px; padding: 3px 0;
    opacity: 0.65; animation: fadeIn .3s; display: flex; align-items: center; gap: 5px;
  }
  .msg.status .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .msg.status .dot.thinking { background: #58a6ff; animation: pulse 1.2s infinite; }
  .msg.status .dot.tool_call { background: #d29922; }
  .msg.status .dot.tool_done { background: #3fb950; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
    display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 24px; width: 480px; max-width: 90vw; max-height: 80vh; overflow-y: auto;
  }
  .modal h2 { font-size: 16px; margin-bottom: 16px; }
  .modal label { font-size: 12px; color: #8b949e; display: block; margin-bottom: 4px; }
  .modal input, .modal textarea {
    width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    color: #e1e4e8; padding: 8px 12px; font-size: 13px; font-family: inherit; margin-bottom: 12px;
  }
  .modal textarea { min-height: 200px; resize: vertical; }
  .modal input:focus, .modal textarea:focus { outline: none; border-color: #58a6ff; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-danger { background: #da3633; border-color: #f85149; color: #fff; }
  .btn-danger:hover { background: #f85149; }

  .toast {
    position: fixed; bottom: 20px; right: 20px; background: #238636; color: #fff;
    padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 100;
    animation: fadeIn .3s;
  }
  .toast.error { background: #da3633; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .popup-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 300;
    display: none; align-items: center; justify-content: center;
  }
  .popup-overlay.open { display: flex; }
  .popup-box {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 24px; width: 400px; max-width: 90vw;
  }
  .popup-box h3 { font-size: 15px; margin-bottom: 16px; color: #e1e4e8; }
  .popup-option {
    display: block; width: 100%; padding: 10px 14px; margin-bottom: 8px;
    background: #21262d; border: 1px solid #30363d; border-radius: 8px;
    color: #c9d1d9; cursor: pointer; font-size: 14px; text-align: left;
  }
  .popup-option:hover { background: #30363d; border-color: #58a6ff; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>交易助手</h1>
    <div class="user-switcher">
      <select id="userSelect"></select>
      <button onclick="applySwitchUser()">切</button>
      <button onclick="addUser()">+</button>
      <button onclick="removeUser()" style="color:#f85149;border-color:#f8514944">-</button>
    </div>
  </div>
  <div class="conv-actions">
    <button class="btn btn-primary" onclick="newConversation()">+ 新会话</button>
  </div>
  <div class="conv-list" id="convList"></div>

  <div class="skills-section">
    <div class="skills-header" onclick="toggleSkills()">
      <span><span class="arrow" id="skillsArrow">▸</span> Skills</span>
      <button class="btn btn-primary" style="padding:2px 8px;font-size:11px;width:auto" onclick="event.stopPropagation();openCreateModal()">+</button>
    </div>
    <div class="skills-list" id="skillsList"></div>
  </div>

  <div class="mcp-section">
    <div class="mcp-header" onclick="toggleMcp()">
      <span><span class="arrow" id="mcpArrow">▸</span> MCP 服务</span>
      <button class="btn btn-primary" style="padding:2px 8px;font-size:11px;width:auto" onclick="event.stopPropagation();openMcpCreateModal()">+</button>
    </div>
    <div class="mcp-list" id="mcpList"></div>
  </div>
</div>

<!-- Popup Modal -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box">
    <h3 id="popupTitle">请选择</h3>
    <div id="popupOptions"></div>
  </div>
</div>

<!-- MCP Modal -->
<div class="modal-overlay" id="mcpModal">
  <div class="modal">
    <h2 id="mcpModalTitle">添加 MCP 服务</h2>
    <label>Server ID（唯一标识）</label>
    <input id="mcpServerId" placeholder="my-mcp-server" />
    <label>显示名称</label>
    <input id="mcpServerName" placeholder="我的 MCP 服务" />
    <label>传输方式</label>
    <select id="mcpTransport" onchange="onMcpTransportChange()">
      <option value="stdio">stdio（命令行进程）</option>
      <option value="sse">sse（HTTP SSE 端点）</option>
      <option value="streamable_http">streamable_http</option>
    </select>
    <div id="mcpStdioFields">
      <label>启动命令</label>
      <input id="mcpCommand" placeholder="例如 npx 或 python" />
      <label>参数（每行一个）</label>
      <textarea id="mcpArgs" placeholder="-y&#10;@modelcontextprotocol/server-brave-search&#10;" style="min-height:60px;resize:vertical"></textarea>
    </div>
    <div id="mcpUrlFields" style="display:none">
      <label>URL</label>
      <input id="mcpUrl" placeholder="https://mcp.example.com/sse" />
    </div>
    <label>环境变量（每行一个，格式 KEY=VALUE）</label>
    <textarea id="mcpEnv" placeholder="BRAVE_API_KEY=xxx&#10;GITHUB_TOKEN=yyy" style="min-height:50px;resize:vertical"></textarea>
    <label>HTTP Headers（每行一个，格式 Key: Value，仅 SSE）</label>
    <textarea id="mcpHeaders" placeholder="Authorization: Bearer xxx" style="min-height:40px;resize:vertical"></textarea>
    <label class="inline"><input type="checkbox" id="mcpEnabled" checked /> 启用</label>
    <div class="modal-actions">
      <button class="btn btn-danger" id="mcpDeleteBtn" style="display:none;margin-right:auto" onclick="deleteMcp()">删除</button>
      <button class="btn" onclick="closeMcpModal()">取消</button>
      <button class="btn btn-primary" onclick="saveMcp()">保存</button>
    </div>
  </div>
</div>

<!-- Skill Modal -->
<div class="modal-overlay" id="skillModal">
  <div class="modal">
    <h2 id="skillModalTitle">新建 Skill</h2>
    <label>名称（英文）</label>
    <input id="skillName" placeholder="my-strategy" />
    <label>内容（Markdown）</label>
    <textarea id="skillContent" placeholder="# 策略说明&#10;&#10;描述你的策略..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-danger" id="skillDeleteBtn" style="display:none;margin-right:auto" onclick="deleteSkill()">删除</button>
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveSkill()">保存</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="chat-header" id="chatHeader">
    <span>选择或创建一个会话开始对话</span>
    <span class="user-badge" id="userBadge"></span>
  </div>
  <div class="empty-state" id="emptyState">选择一个会话或创建新会话</div>
  <div class="messages" id="messages" style="display:none"></div>
  <div class="input-area" id="inputArea" style="display:none">
    <textarea id="input" placeholder="输入消息..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="btn btn-primary" onclick="sendMessage()">发送</button>
  </div>
</div>

<script>
const BASE = '';
const STORAGE_KEY = 'trading_users';
let currentConvId = null;
let userId = '';

// ── User management ──
function getUsers() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveUsers(users) { localStorage.setItem(STORAGE_KEY, JSON.stringify(users)); }

function initUsers() {
  let users = getUsers();
  if (users.length === 0) {
    users = ['user-alice', 'user-bob'];
    saveUsers(users);
  }
  renderUserSelect(users);
  if (!userId) switchUser(users[0]);
}

function renderUserSelect(users) {
  const sel = document.getElementById('userSelect');
  // 清空
  while (sel.firstChild) sel.removeChild(sel.firstChild);
  // 重建 option
  for (const u of users) {
    const opt = document.createElement('option');
    opt.value = u;
    opt.textContent = u;
    sel.appendChild(opt);
  }
  sel.value = userId || users[0];
}

function applySwitchUser() {
  const sel = document.getElementById('userSelect');
  if (sel.value) switchUser(sel.value);
}

function switchUser(newUserId) {
  if (!newUserId || newUserId === userId) return;
  userId = newUserId;
  renderUserSelect(getUsers());
  // Reset chat — 先重建 chatHeader（含 userBadge），再设置 textContent
  currentConvId = null;
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('messages').style.display = 'none';
  document.getElementById('inputArea').style.display = 'none';
  document.getElementById('chatHeader').innerHTML = '<span>选择或创建一个会话开始对话</span><span class="user-badge" id="userBadge"></span>';
  document.getElementById('userBadge').textContent = userId;
  document.getElementById('messages').innerHTML = '';
  loadConversations();
  loadSkills();
  loadMcp();
  toast('已切换到 ' + userId);
}

function addUser() {
  const name = prompt('输入新用户名（英文+数字，如 user-charlie）：');
  if (!name || !/^[a-zA-Z0-9_-]+$/.test(name)) { toast('用户名仅支持英文数字和 -_', true); return; }
  let users = getUsers();
  if (users.includes(name)) { toast('用户已存在', true); return; }
  users.push(name);
  saveUsers(users);
  renderUserSelect(users);
  document.getElementById('userSelect').value = name;
  switchUser(name);
  toast('已切换到 ' + name);
}

function removeUser() {
  let users = getUsers();
  if (users.length <= 1) { toast('至少保留一个用户', true); return; }
  if (!confirm('删除用户 ' + userId + '？将同时删除其所有会话记录。')) return;
  users = users.filter(u => u !== userId);
  saveUsers(users);
  switchUser(users[0]);
  toast('用户已删除');
}

// ── API ──
async function api(method, path, body) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + userId, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(BASE + path, opts);
  if (!resp.ok) throw new Error((await resp.json().catch(() => ({}))).detail || resp.statusText);
  return resp;
}

// ── Conversations ──
async function loadConversations() {
  try {
    const data = await api('GET', '/conversations').then(r => r.json());
    const list = document.getElementById('convList');
    if (data.conversations.length === 0) {
      list.innerHTML = '<div style="padding:12px;color:#484f58;font-size:13px">暂无会话</div>';
      return;
    }
    list.innerHTML = data.conversations.map(c => `
      <div class="conv-item${c.conversation_id === currentConvId ? ' active' : ''}" onclick="selectConversation('${c.conversation_id}')">
        <div class="name">${c.conversation_id.slice(0, 12)}...</div>
        <div class="time">${new Date(c.created_at).toLocaleString('zh-CN')}</div>
      </div>
    `).join('');
  } catch (e) { console.error('load conversations:', e); }
}

async function newConversation() {
  try {
    const data = await api('POST', '/conversations').then(r => r.json());
    await loadConversations();
    selectConversation(data.conversation_id);
    toast('会话已创建');
  } catch (e) { toast('创建失败: ' + e.message, true); }
}

async function selectConversation(id) {
  currentConvId = id;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('messages').style.display = 'flex';
  document.getElementById('inputArea').style.display = 'flex';
  document.getElementById('chatHeader').innerHTML = '<span>会话 <strong>' + id.slice(0, 16) + '...</strong></span><span class="user-badge" id="userBadge">' + userId + '</span>';
  document.getElementById('messages').innerHTML = '';

  try {
    const data = await api('GET', '/conversations/' + id + '/history').then(r => r.json());
    for (const m of data.messages) {
      const role = m.role === 'user' ? 'user' : m.role === 'tool' ? 'tool' : 'assistant';
      appendMessage(role, m.content);
      // 如果 tool 消息携带 artifact（card 数据），同时渲染 card
      if (m.artifact) {
        appendMessage('card', JSON.stringify(m.artifact, null, 2));
      }
    }
  } catch (e) { console.error('load history:', e); }
  scrollBottom();
  loadConversations();
}

// ── Chat ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !currentConvId) return;
  input.value = '';
  input.style.height = 'auto';

  appendMessage('user', text);
  let bubble = null;  // 延迟创建，等第一个 text token 到达

  try {
    const resp = await fetch(BASE + '/conversations/' + currentConvId + '/chat/stream', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + userId, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      let i = 0;
      while (i < lines.length) {
        if (lines[i].startsWith('event: text') && i + 1 < lines.length && lines[i + 1].startsWith('data: ')) {
          const data = JSON.parse(lines[i + 1].slice(6));
          if (!bubble) bubble = appendMessage('assistant', '', true);  // 第一个 text 才创建
          bubble.textContent += data.content;
          i += 2;
        } else if (lines[i].startsWith('event: done')) {
          if (bubble) bubble.classList.remove('streaming');
          i += 1;
        } else if (lines[i].startsWith('event: tool') && i + 1 < lines.length && lines[i + 1].startsWith('data: ')) {
          appendMessage('tool', JSON.parse(lines[i + 1].slice(6)).content);
          i += 2;
        } else if (lines[i].startsWith('event: card') && i + 1 < lines.length && lines[i + 1].startsWith('data: ')) {
          appendMessage('card', JSON.stringify(JSON.parse(lines[i + 1].slice(6)), null, 2));
          i += 2;
        } else if (lines[i].startsWith('event: popup') && i + 1 < lines.length && lines[i + 1].startsWith('data: ')) {
          const d = JSON.parse(lines[i + 1].slice(6));
          showPopup(d.title, d.options);
          i += 2;
        } else if (lines[i].startsWith('event: interrupt') && i + 1 < lines.length && lines[i + 1].startsWith('data: ')) {
          const d = JSON.parse(lines[i + 1].slice(6));
          appendMessage('tool', '[等待选择: ' + (d.title || '') + ']');
          i += 2;
        } else if (lines[i].startsWith('event: status') && i + 1 < lines.length && lines[i + 1].startsWith('data: ')) {
          const s = JSON.parse(lines[i + 1].slice(6));
          appendStatus(s.type, s.name);
          i += 2;
        } else if (lines[i].startsWith('event: error')) {
          if (i + 1 < lines.length && lines[i + 1].startsWith('data: ')) {
            if (!bubble) bubble = appendMessage('assistant', '', true);
            bubble.textContent = '[错误] ' + JSON.parse(lines[i + 1].slice(6)).message;
          }
          if (bubble) bubble.classList.remove('streaming');
          i += 2;
        } else {
          i += 1;
        }
      }
      scrollBottom();
    }
    if (bubble) bubble.classList.remove('streaming');
  } catch (e) {
    if (!bubble) bubble = appendMessage('assistant', '', true);
    bubble.textContent = '[错误] ' + e.message;
    bubble.classList.remove('streaming');
  }
  scrollBottom();
}

function appendMessage(role, content, streaming) {
  const div = document.createElement('div');
  div.className = 'msg ' + role + (streaming ? ' streaming' : '');
  div.textContent = content;
  document.getElementById('messages').appendChild(div);
  scrollBottom();
  return div;
}

function appendStatus(type, name) {
  const div = document.createElement('div');
  div.className = 'msg status';
  let dotCls = type === 'thinking' ? 'thinking' : type === 'tool_call' ? 'tool_call' : 'tool_done';
  let text = '';
  if (type === 'thinking') {
    text = 'LLM 正在思考...';
  } else if (type === 'tool_call') {
    text = '正在调用 Tool: ' + name;
  } else if (type === 'tool_done') {
    text = 'Tool [' + name + '] 执行完成';
  }
  div.innerHTML = '<span class="dot ' + dotCls + '"></span>' + text;
  document.getElementById('messages').appendChild(div);
  scrollBottom();
  // 自动移除旧状态（保留最新的思考状态）
  const all = document.querySelectorAll('.msg.status');
  if (type === 'thinking' && all.length > 1) {
    for (let i = 0; i < all.length - 1; i++) all[i].remove();
  }
  return div;
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function toast(msg, isError) {
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── Skills ──
const BASE_SKILLS = ['order-guide', 'market-info', 'gift-card'];
let editSkillName = null;

function toggleSkills() {
  const list = document.getElementById('skillsList');
  const arrow = document.getElementById('skillsArrow');
  const open = list.classList.toggle('open');
  arrow.classList.toggle('open', open);
  if (open) loadSkills();
}

let skillApisCache = {};

async function loadSkills() {
  try {
    const data = await api('GET', '/users/me/skills').then(r => r.json());
    const list = document.getElementById('skillsList');
    const allNames = [...new Set([...BASE_SKILLS, ...data.skills])];

    // 加载每个 skill 的 API schema
    const apiPromises = allNames.map(async name => {
      try {
        const r = await api('GET', '/users/me/skills/' + encodeURIComponent(name) + '/apis');
        return { name, apis: (await r.json()).apis };
      } catch { return { name, apis: [] }; }
    });
    const results = await Promise.all(apiPromises);
    skillApisCache = {};
    for (const r of results) skillApisCache[r.name] = r.apis;

    list.innerHTML = allNames.map(name => {
      const isBase = BASE_SKILLS.includes(name);
      const apis = skillApisCache[name] || [];
      const showBadges = apis.map(a => `<span class="api-show ${a.show_type}">${a.show_type === 'card' ? '🃜' : '📝'}</span>`).join('');
      const clickHandler = `onclick="toggleSkillApis('${name}')"`;
      return `<div>
        <div class="skill-item ${isBase ? 'base' : ''}" ${clickHandler} style="justify-content:flex-start;gap:4px">
          <span>${isBase ? '📋' : '📝'} ${name}</span>
          <span class="api-badge">${apis.length} APIs</span>
          <span style="flex:1"></span>
          <span style="font-size:10px">${showBadges}</span>
          ${isBase ? '' : '<span class="del" onclick="event.stopPropagation();openEditModal(\'' + name + '\')">✎</span>'}
          ${isBase ? '' : '<span class="del" onclick="event.stopPropagation();deleteSkill(\'' + name + '\')">✕</span>'}
        </div>
        <div class="skill-apis" id="skillApis-${name}"></div>
      </div>`;
    }).join('');
  } catch (e) { console.error('load skills:', e); }
}

function toggleSkillApis(name) {
  const panel = document.getElementById('skillApis-' + name);
  if (!panel) return;
  const open = panel.classList.toggle('open');
  if (open && panel.children.length === 0) {
    const apis = skillApisCache[name] || [];
    panel.innerHTML = apis.map(a => {
      const params = a.params || [];
      const reqLabel = params.filter(p => p.required).map(p => p.name + '*').join(', ');
      const optLabel = params.filter(p => !p.required).map(p => p.name).join(', ');
      const pLabel = [reqLabel, optLabel].filter(Boolean).join(' | ');
      return `<div class="api-item">
        <span class="api-method">${a.method}</span><span class="api-path">${a.path}</span>
        <span class="api-show ${a.show_type}">${a.show_type}</span>
        <div class="api-desc">${a.description || ''}</div>
        ${pLabel ? '<div class="api-params">params: ' + pLabel + '</div>' : ''}
      </div>`;
    }).join('') || '<div class="api-item" style="color:#484f58">暂无 API</div>';
  }
}

function openCreateModal() {
  editSkillName = null;
  document.getElementById('skillModalTitle').textContent = '新建 Skill';
  document.getElementById('skillName').value = '';
  document.getElementById('skillName').disabled = false;
  document.getElementById('skillContent').value = '';
  document.getElementById('skillDeleteBtn').style.display = 'none';
  document.getElementById('skillModal').classList.add('open');
}

async function openEditModal(name) {
  try {
    const resp = await api('GET', '/users/me/skills/' + encodeURIComponent(name));
    const content = await resp.text();
    editSkillName = name;
    document.getElementById('skillModalTitle').textContent = '编辑 Skill';
    document.getElementById('skillName').value = name;
    document.getElementById('skillName').disabled = true;
    document.getElementById('skillContent').value = content;
    document.getElementById('skillDeleteBtn').style.display = 'inline-block';
    document.getElementById('skillModal').classList.add('open');
  } catch (e) { toast('加载失败: ' + e.message, true); }
}

function closeModal() {
  document.getElementById('skillModal').classList.remove('open');
}

async function saveSkill() {
  const name = document.getElementById('skillName').value.trim();
  const content = document.getElementById('skillContent').value;
  if (!name || !/^[a-zA-Z0-9_-]+$/.test(name)) { toast('名称仅支持英文数字和 -_', true); return; }
  if (!content) { toast('内容不能为空', true); return; }

  try {
    if (editSkillName) {
      await api('PUT', '/users/me/skills/' + encodeURIComponent(editSkillName), { content });
      toast('已更新 ' + editSkillName);
    } else {
      await api('POST', '/users/me/skills', { name, content });
      toast('已创建 ' + name);
    }
    closeModal();
    loadSkills();
  } catch (e) { toast('保存失败: ' + e.message, true); }
}

async function deleteSkill(name) {
  if (!name) name = editSkillName;
  if (!name) return;
  if (!confirm('删除 Skill "' + name + '"？此操作不可撤销。')) return;
  try {
    await api('DELETE', '/users/me/skills/' + encodeURIComponent(name));
    toast('已删除 ' + name);
    closeModal();
    loadSkills();
  } catch (e) { toast('删除失败: ' + e.message, true); }
}

// ── MCP ──
let editMcpServerId = null;

function toggleMcp() {
  const list = document.getElementById('mcpList');
  const arrow = document.getElementById('mcpArrow');
  const open = list.classList.toggle('open');
  arrow.classList.toggle('open', open);
  if (open) loadMcp();
}

async function loadMcp() {
  try {
    const data = await api('GET', '/users/me/mcp').then(r => r.json());
    const list = document.getElementById('mcpList');
    if (data.configs.length === 0) {
      list.innerHTML = '<div style="padding:8px 12px;color:#484f58;font-size:12px">暂无 MCP 服务</div>';
      return;
    }
    list.innerHTML = data.configs.map(c => {
      const transportCls = c.transport === 'stdio' ? 'stdio' : c.transport === 'sse' ? 'sse' : 'http';
      const statusCls = c.enabled ? 'on' : 'off';
      const statusLabel = c.enabled ? '启用' : '停用';
      return `<div>
        <div class="mcp-item" onclick="toggleMcpDetail('${c.server_id}')" style="gap:4px">
          <span class="name" title="${c.server_id}">${c.server_name || c.server_id}</span>
          <span class="transport ${transportCls}">${c.transport}</span>
          <span class="status ${statusCls}">${statusLabel}</span>
          <span style="flex:1"></span>
          <span class="del" onclick="event.stopPropagation();openMcpEditModal('${c.server_id}')">✎</span>
          <span class="del" onclick="event.stopPropagation();deleteMcp('${c.server_id}')">✕</span>
        </div>
        <div class="mcp-detail" id="mcpDetail-${c.server_id}">
          ${c.command ? '<div class="detail-row">命令: <code>' + c.command + '</code></div>' : ''}
          ${c.args && c.args.length ? '<div class="detail-row">参数: <code>' + c.args.join(' ') + '</code></div>' : ''}
          ${c.url ? '<div class="detail-row">URL: <code>' + c.url + '</code></div>' : ''}
          ${c.env_vars && Object.keys(c.env_vars).length ? '<div class="detail-row">Env: <code>' + Object.keys(c.env_vars).join(', ') + '</code></div>' : ''}
          ${c.headers && Object.keys(c.headers).length ? '<div class="detail-row">Headers: <code>' + Object.keys(c.headers).join(', ') + '</code></div>' : ''}
        </div>
      </div>`;
    }).join('');
  } catch (e) { console.error('load mcp:', e); }
}

function toggleMcpDetail(serverId) {
  const panel = document.getElementById('mcpDetail-' + serverId);
  if (panel) panel.classList.toggle('open');
}

function onMcpTransportChange() {
  const t = document.getElementById('mcpTransport').value;
  document.getElementById('mcpStdioFields').style.display = t === 'stdio' ? '' : 'none';
  document.getElementById('mcpUrlFields').style.display = t === 'sse' || t === 'streamable_http' ? '' : 'none';
}

function openMcpCreateModal() {
  editMcpServerId = null;
  document.getElementById('mcpModalTitle').textContent = '添加 MCP 服务';
  document.getElementById('mcpServerId').value = '';
  document.getElementById('mcpServerId').disabled = false;
  document.getElementById('mcpServerName').value = '';
  document.getElementById('mcpTransport').value = 'stdio';
  document.getElementById('mcpCommand').value = '';
  document.getElementById('mcpArgs').value = '';
  document.getElementById('mcpUrl').value = '';
  document.getElementById('mcpEnv').value = '';
  document.getElementById('mcpHeaders').value = '';
  document.getElementById('mcpEnabled').checked = true;
  document.getElementById('mcpDeleteBtn').style.display = 'none';
  onMcpTransportChange();
  document.getElementById('mcpModal').classList.add('open');
}

function openMcpEditModal(serverId) {
  // 从列表数据获取配置（通过重新请求）
  api('GET', '/users/me/mcp').then(r => r.json()).then(data => {
    const c = data.configs.find(x => x.server_id === serverId);
    if (!c) { toast('配置未找到', true); return; }
    editMcpServerId = serverId;
    document.getElementById('mcpModalTitle').textContent = '编辑 MCP 服务';
    document.getElementById('mcpServerId').value = c.server_id;
    document.getElementById('mcpServerId').disabled = true;
    document.getElementById('mcpServerName').value = c.server_name || '';
    document.getElementById('mcpTransport').value = c.transport;
    document.getElementById('mcpCommand').value = c.command || '';
    document.getElementById('mcpArgs').value = (c.args || []).join('\n');
    document.getElementById('mcpUrl').value = c.url || '';
    document.getElementById('mcpEnv').value = (c.env_vars ? Object.entries(c.env_vars).map(([k,v]) => k + '=' + v).join('\n') : '');
    document.getElementById('mcpHeaders').value = (c.headers ? Object.entries(c.headers).map(([k,v]) => k + ': ' + v).join('\n') : '');
    document.getElementById('mcpEnabled').checked = c.enabled;
    document.getElementById('mcpDeleteBtn').style.display = 'inline-block';
    onMcpTransportChange();
    document.getElementById('mcpModal').classList.add('open');
  }).catch(e => toast('加载失败: ' + e.message, true));
}

function closeMcpModal() {
  document.getElementById('mcpModal').classList.remove('open');
}

async function saveMcp() {
  const serverId = document.getElementById('mcpServerId').value.trim();
  const serverName = document.getElementById('mcpServerName').value.trim();
  const transport = document.getElementById('mcpTransport').value;
  if (!serverId || !/^[a-zA-Z0-9_-]+$/.test(serverId)) { toast('Server ID 仅支持英文数字和 -_', true); return; }

  const body = {
    server_id: serverId,
    server_name: serverName || serverId,
    transport: transport,
    enabled: document.getElementById('mcpEnabled').checked,
  };

  if (transport === 'stdio') {
    body.command = document.getElementById('mcpCommand').value.trim() || null;
    body.args = document.getElementById('mcpArgs').value.trim()
      ? document.getElementById('mcpArgs').value.trim().split('\n').filter(Boolean) : [];
  } else {
    body.url = document.getElementById('mcpUrl').value.trim() || null;
    body.headers = parseKeyValue(document.getElementById('mcpHeaders').value, ':');
  }
  body.env_vars = parseKeyValue(document.getElementById('mcpEnv').value, '=');

  try {
    if (editMcpServerId) {
      await api('PUT', '/users/me/mcp/' + encodeURIComponent(editMcpServerId), body);
      toast('已更新 ' + editMcpServerId);
    } else {
      await api('POST', '/users/me/mcp', body);
      toast('已添加 ' + serverId);
    }
    closeMcpModal();
    loadMcp();
  } catch (e) { toast('保存失败: ' + e.message, true); }
}

async function deleteMcp(serverId) {
  if (!serverId) serverId = editMcpServerId;
  if (!serverId) return;
  if (!confirm('删除 MCP 服务 "' + serverId + '"？此操作不可撤销。')) return;
  try {
    await api('DELETE', '/users/me/mcp/' + encodeURIComponent(serverId));
    toast('已删除 ' + serverId);
    closeMcpModal();
    loadMcp();
  } catch (e) { toast('删除失败: ' + e.message, true); }
}

function parseKeyValue(text, sep) {
  if (!text || !text.trim()) return {};
  const out = {};
  for (const line of text.trim().split('\n')) {
    const idx = line.indexOf(sep);
    if (idx > 0) {
      const k = line.slice(0, idx).trim();
      const v = line.slice(idx + 1).trim();
      if (k) out[k] = v;
    }
  }
  return Object.keys(out).length ? out : null;
}

// ── Popup ──
let popupCallId = null;

function showPopup(title, options) {
  document.getElementById('popupTitle').textContent = title;
  const optsDiv = document.getElementById('popupOptions');
  optsDiv.innerHTML = options.map(o =>
    `<button class="popup-option" onclick="selectPopupOption('${o.id}')">${o.label}</button>`
  ).join('');
  document.getElementById('popupOverlay').classList.add('open');
}

let pendingPopupConv = null;

async function selectPopupOption(optionId) {
  document.getElementById('popupOverlay').classList.remove('open');
  appendMessage('tool', '选择了: ' + optionId);
  const bubble = appendMessage('assistant', '', true);
  try {
    const resp = await fetch(BASE + '/conversations/' + currentConvId + '/resume', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + userId, 'Content-Type': 'application/json' },
      body: JSON.stringify({ option_id: optionId }),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith('event: text') && i + 1 < lines.length && lines[i + 1].startsWith('data: ')) {
          bubble.textContent += JSON.parse(lines[i + 1].slice(6)).content;
          i++;
        } else if (lines[i].startsWith('event: done')) {
          bubble.classList.remove('streaming');
        } else if (lines[i].startsWith('event: tool') && i + 1 < lines.length && lines[i + 1].startsWith('data: ')) {
          appendMessage('tool', JSON.parse(lines[i + 1].slice(6)).content);
          i++;
        }
      }
      scrollBottom();
    }
    bubble.classList.remove('streaming');
  } catch (e) {
    bubble.textContent = '[错误] ' + e.message;
    bubble.classList.remove('streaming');
  }
}
